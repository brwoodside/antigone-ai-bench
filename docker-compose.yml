services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/history.db
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty for same-origin deployments behind Caddy.
        # Set to e.g. http://localhost:8080 when running without a reverse proxy.
        - VITE_API_URL=${VITE_API_URL-}
    ports:
      - "5173:80"
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
